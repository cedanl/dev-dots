# Tmux configuration
# Installed to ~/.tmux.conf

# Start windows and panes at 1 (not 0)
set -g base-index 1
setw -g pane-base-index 1

# Renumber windows when one is closed
set -g renumber-windows on

# Status bar - modern developer look
set -g status on
set -g status-interval 1
set -g status-style bg=#282c34,fg=#abb2bf
set -g status-left-length 50
set -g status-right-length 80

# Left: session name with icon
set -g status-left '#[bg=#61afef,fg=#282c34,bold]  ⌨  #S  #[bg=#282c34,fg=#61afef]│'

# Right: user@host | date time | indicators
set -g status-right "#[fg=#5c6370]│#[fg=#e5c07b] #(whoami)@#h #[fg=#5c6370]│#[fg=#98c379] %Y-%m-%d  %H:%M:%S #[fg=#5c6370]│#[fg=#61afef]#{?client_prefix, 🔒 ,}#{?window_zoomed_flag, ⤢ ,}"

# Activity monitoring
setw -g monitor-activity on
set -g visual-activity off

# Automatically restore tmux state
set -g @resurrect-strategy-nvim 'session'

# Panes - clean borders
set -g pane-border-style fg=#3e4451
set -g pane-active-border-style fg=#61afef

# Messages / prompts
set -g message-style bg=#3e4451,fg=#abb2bf
set -g message-command-style bg=#3e4451,fg=#abb2bf

# Window tabs
setw -g window-status-style fg=#7f848e,bg=default
setw -g window-status-current-style fg=#282c34,bg=#61afef,bold
setw -g window-status-activity-style fg=#e06c75
setw -g window-status-bell-style fg=#e5c07b
setw -g window-status-separator '  '

# Clock
setw -g clock-mode-colour '#61afef'
